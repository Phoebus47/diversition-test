# Project
sonar.projectKey=diversition-test
sonar.projectName=Diversition Image Gallery SPA
sonar.host.url=http://localhost:9001
# Token: set SONAR_TOKEN in env or .env (npm run sonar uses dotenv-cli). Do NOT commit the token here.

# Source & Test
sonar.sources=src
sonar.tests=__tests__

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Exclusions from main analysis
sonar.exclusions=\
  **/__tests__/**,\
  **/__mocks__/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/eslint.config.mjs

# Coverage (lcov from Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
  **/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,\
  **/__tests__/**,\
  **/__mocks__/**,\
  **/vitest.setup.ts

# Encoding & TypeScript
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
